<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전시회 조사 보고서</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: #f5f7fa;
            color: #333;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            padding: 2rem;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            color: #1a1a2e;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-decoration: none;
            color: inherit;
            display: block;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .card h2 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #1a1a2e;
        }
        .card p {
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>전시회 조사 보고서</h1>
        <a class="card" href="AW2026_참가업체_조사보고서.html">
            <h2>AW2026 참가업체 조사보고서</h2>
            <p>AW2026 전시회 참가업체 분석 리포트</p>
        </a>
        <a class="card" href="ITES_2026_스마트팜_조사보고서.html">
            <h2>ITES 2026 스마트팜 조사보고서</h2>
            <p>ITES 2026 스마트팜 참가업체 분석 리포트</p>
        </a>
    </div>
</body>
</html>
